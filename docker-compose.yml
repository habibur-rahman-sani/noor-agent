services:
  mongo:
    image: mongo:7
    container_name: noor-mongo
    restart: unless-stopped
    volumes:
      - noor_mongo_data:/data/db

  agno:
    build: .
    container_name: noor-agent
    restart: unless-stopped
    depends_on:
      - mongo
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://mongo:27017
    # .env হোস্ট থেকে মাউন্ট করা — ফলে UI-র ⚙️ সেটিংস থেকে বসানো API key
    # কন্টেইনার রিস্টার্ট/রিবিল্ডের পরও থেকে যায় (হোস্টের .env-এ লেখা হয়)।
    volumes:
      - ./.env:/opt/agno_system/.env
    ports:
      - "8000:8000"

volumes:
  noor_mongo_data:
