services:
  mongo:
    image: mongo:7
    container_name: noor-mongo
    restart: unless-stopped
    volumes:
      - noor_mongo_data:/data/db

  agno:
    build: .
    container_name: noor-agent
    restart: unless-stopped
    depends_on:
      - mongo
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://mongo:27017
    ports:
      - "8000:8000"

volumes:
  noor_mongo_data:
